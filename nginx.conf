server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — every route resolves to the client app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Immutable hashed assets emitted by Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_vary on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
